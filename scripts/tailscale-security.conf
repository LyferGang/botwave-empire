# Tailscale Mesh Security Configuration
# ======================================
# This file configures your Tailscale mesh for secure multi-node operation.
# Save as /etc/sysctl.d/99-tailscale-security.conf and apply with: sudo sysctl --system

# IPv4 forwarding (required for subnet routing/exit nodes)
net.ipv4.ip_forward = 1

# IPv6 forwarding
net.ipv6.conf.all.forwarding = 1

# Strict reverse path filtering (security)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't accept source routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0

# Ignore ICMP redirects from gateways listed in the default gateway list
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
